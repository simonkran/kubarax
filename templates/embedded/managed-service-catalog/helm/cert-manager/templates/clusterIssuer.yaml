{{- if and .Values.clusterIssuer .Values.clusterIssuer.name }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
  labels:
    app.kubernetes.io/managed-by: kubarax
spec:
  acme:
    email: {{ .Values.clusterIssuer.email }}
    server: {{ .Values.clusterIssuer.server }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.name }}-account-key
    solvers:
      - dns01:
          {{- if eq .Values.clusterIssuer.solver "cloudflare" }}
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: apiKey
          {{- else if eq .Values.clusterIssuer.solver "route53" }}
          route53:
            region: {{ .Values.clusterIssuer.route53Region | default "us-east-1" }}
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
          {{- end }}
{{- end }}
